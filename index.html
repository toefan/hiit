<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HIIT Velo – 20 Min</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --accent: #e8ff3c;
    --red: #ff3c3c;
    --blue: #3caaff;
    --muted: #3a3a4a;
    --text: #f0f0f0;
    --dim: #aaaabc;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }

  #scale-root {
    position: fixed; top: 0; left: 0;
    width: 1920px; height: 1080px;
    transform-origin: top left;
    background: var(--bg);
    font-family: 'DM Mono', monospace;
    color: var(--text);
    overflow: hidden;
  }

  #scale-root::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(232,255,60,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,255,60,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none; z-index: 0;
  }

  #app {
    position: relative; z-index: 1;
    width: 1920px; height: 1080px;
    display: flex; flex-direction: column;
    padding: 36px 80px 36px;
    gap: 24px;
  }

  /* ── PHASE NAME ── */
  #phase-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 7rem;
    line-height: 1;
    letter-spacing: 12px;
    color: var(--accent);
    text-align: center;
    transition: color 0.3s;
    flex-shrink: 0;
  }

  /* ── MIDDLE ── */
  #middle {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 80px;
    min-height: 0;
  }

  /* ── TIMER ── */
  #timer-ring {
    position: relative;
    width: 440px; height: 440px;
    flex-shrink: 0;
  }

  #timer-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  #ring-bg  { fill: none; stroke: var(--muted); stroke-width: 12; }
  #ring-fill {
    fill: none; stroke: var(--accent); stroke-width: 12;
    stroke-linecap: round;
    stroke-dasharray: 879.6; stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear, stroke 0.3s;
  }

  #timer-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  #countdown {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 9rem; line-height: 1;
    color: var(--text); transition: color 0.3s;
  }

  #timer-sub {
    font-size: 1.1rem; letter-spacing: 6px;
    color: var(--dim); text-transform: uppercase;
    margin-top: 6px;
  }

  /* ── RIGHT PANELS ── */
  #right {
    display: flex; flex-direction: column;
    gap: 20px; width: 700px; flex-shrink: 0;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--muted);
    border-radius: 14px;
    padding: 24px 36px;
  }

  .panel-title {
    font-size: 1rem;
    letter-spacing: 5px;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  #block-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.4rem; letter-spacing: 4px;
    color: var(--text); line-height: 1;
    margin-bottom: 8px;
  }

  #block-detail {
    font-size: 1.2rem;
    color: var(--dim);
    line-height: 1.8;
    white-space: pre-line;
  }

  #rounds-grid {
    display: flex; flex-wrap: wrap; gap: 14px;
  }

  .round-dot {
    width: 58px; height: 58px;
    border-radius: 50%;
    border: 3px solid var(--muted);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; font-weight: 500;
    color: var(--dim); transition: all 0.3s;
  }

  .round-dot.done {
    background: var(--accent); border-color: var(--accent);
    color: var(--bg); font-weight: 700;
  }

  .round-dot.active {
    border-color: var(--accent); color: var(--accent);
    box-shadow: 0 0 20px rgba(232,255,60,0.55);
    animation: pulse-dot 1s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.18); }
  }

  #next-phase {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem; letter-spacing: 4px; line-height: 1;
  }

  #next-duration {
    font-size: 1.15rem; color: var(--dim);
    margin-top: 8px; letter-spacing: 3px;
  }

  /* ── BOTTOM BARS ── */
  #bottom {
    display: flex; gap: 60px;
    align-items: flex-start;
    flex-shrink: 0;
  }

  .bar-group { flex: 1; }

  .bar-label-row {
    display: flex; justify-content: space-between;
    align-items: baseline; margin-bottom: 12px;
  }

  .bar-label {
    font-size: 1.1rem; letter-spacing: 5px;
    color: var(--dim); text-transform: uppercase;
  }

  .bar-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.6rem; letter-spacing: 2px;
    color: var(--text);
  }

  .bar-track {
    height: 16px; background: var(--muted);
    border-radius: 8px; overflow: hidden;
  }

  .bar-fill {
    height: 100%; border-radius: 8px;
    transition: width 1s linear, background 0.3s;
  }

  #total-time {
    font-size: 1.05rem; color: var(--dim);
    margin-top: 10px; text-align: right;
    letter-spacing: 3px;
  }

  /* ── START SCREEN ── */
  #start-screen {
    position: absolute; inset: 0;
    background: var(--bg); z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 56px; transition: opacity 0.5s;
  }

  #start-screen h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11rem; letter-spacing: 20px;
    color: var(--accent); line-height: 1;
  }

  #start-screen .subtitle {
    font-size: 1.5rem; color: var(--dim);
    letter-spacing: 4px; text-align: center; line-height: 2.4;
  }

  .level-buttons {
    display: flex; gap: 60px; align-items: stretch;
  }

  .level-btn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem; letter-spacing: 8px;
    padding: 36px 80px;
    border-radius: 12px; cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; gap: 14px;
    transition: transform 0.2s, box-shadow 0.2s;
    border: 3px solid transparent;
  }

  .level-btn .btn-sub {
    font-family: 'DM Mono', monospace;
    font-size: 1rem; letter-spacing: 3px;
    opacity: 0.75; text-transform: uppercase;
  }

  .level-btn.medium {
    background: transparent;
    color: var(--blue);
    border-color: var(--blue);
  }

  .level-btn.medium:hover {
    transform: scale(1.04);
    box-shadow: 0 0 50px rgba(60,170,255,0.4);
    background: rgba(60,170,255,0.08);
  }

  .level-btn.advanced {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }

  .level-btn.advanced:hover {
    transform: scale(1.04);
    box-shadow: 0 0 50px rgba(232,255,60,0.5);
  }

  /* ── FINISH SCREEN ── */
  #finish-screen {
    display: none;
    position: absolute; inset: 0;
    background: var(--bg); z-index: 100;
    flex-direction: column; align-items: center;
    justify-content: center; gap: 36px;
  }

  #finish-screen h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14rem; letter-spacing: 12px;
    color: var(--accent);
    animation: glow 2s ease-in-out infinite;
  }

  @keyframes glow {
    0%, 100% { text-shadow: 0 0 30px rgba(232,255,60,0.4); }
    50%       { text-shadow: 0 0 90px rgba(232,255,60,0.95); }
  }

  #finish-screen p { font-size: 1.6rem; color: var(--dim); letter-spacing: 6px; }

  #restart-btn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem; letter-spacing: 6px;
    padding: 24px 72px;
    background: transparent; color: var(--accent);
    border: 3px solid var(--accent); border-radius: 8px;
    cursor: pointer; margin-top: 20px;
  }
</style>
</head>
<body>
<div id="scale-root">

  <div id="start-screen">
    <h1>HIIT VELO</h1>
    <p class="subtitle">Wähle dein Level &nbsp;·&nbsp; 20 Minuten</p>
    <div class="level-buttons">
      <button class="level-btn medium" onclick="startWorkout('medium')">
        MEDIUM
        <span class="btn-sub">Aufwärmen · 6×30s Sprint / 30s Erholung<br>Pause · 4×40s Intervall · Ausfahren</span>
      </button>
      <button class="level-btn advanced" onclick="startWorkout('advanced')">
        FORTGESCHRITTEN
        <span class="btn-sub">Aufwärmen · 8×20s Tabata / 10s<br>Pause · 5×40s Intervall · Ausfahren</span>
      </button>
    </div>
  </div>

  <div id="finish-screen">
    <h1>DONE</h1>
    <p>20 MINUTEN ABGESCHLOSSEN – STARK!</p>
    <button id="restart-btn" onclick="showStartScreen()">NOCHMAL</button>
  </div>

  <div id="app">

    <div id="phase-name">AUFWÄRMEN</div>

    <div id="middle">
      <div id="timer-ring">
        <svg viewBox="0 0 300 300">
          <circle id="ring-bg"   cx="150" cy="150" r="140"/>
          <circle id="ring-fill" cx="150" cy="150" r="140"/>
        </svg>
        <div id="timer-center">
          <div id="countdown">3:00</div>
          <div id="timer-sub">Sekunden</div>
        </div>
      </div>

      <div id="right">
        <div class="panel">
          <div class="panel-title">Aktueller Block</div>
          <div id="block-name">BLOCK 1 – TABATA</div>
          <div id="block-detail">8 Runden · 20 Sek. Sprint / 10 Sek. Erholung
Maximales Tempo, voller Widerstand</div>
        </div>
        <div class="panel">
          <div class="panel-title">Runden</div>
          <div id="rounds-grid"></div>
        </div>
        <div class="panel">
          <div class="panel-title">Nächste Phase</div>
          <div id="next-phase">–</div>
          <div id="next-duration"></div>
        </div>
      </div>
    </div>

    <div id="bottom">
      <div class="bar-group">
        <div class="bar-label-row">
          <span class="bar-label">Intensität</span>
          <span class="bar-value" id="intensity-pct">50%</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" id="intensity-fill" style="width:50%;background:var(--blue)"></div>
        </div>
      </div>
      <div class="bar-group">
        <div class="bar-label-row">
          <span class="bar-label">Gesamtfortschritt</span>
          <span class="bar-value" id="total-pct">0%</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" id="total-fill" style="width:0%;background:var(--accent)"></div>
        </div>
        <div id="total-time">0:00 / 20:00</div>
      </div>
    </div>

  </div>
</div>

<script>
function scaleToFit() {
  const r = document.getElementById('scale-root');
  const s = Math.min(window.innerWidth/1920, window.innerHeight/1080);
  r.style.transform = `scale(${s})`;
  r.style.left = ((window.innerWidth  - 1920*s)/2)+'px';
  r.style.top  = ((window.innerHeight - 1080*s)/2)+'px';
}
window.addEventListener('resize', scaleToFit);
scaleToFit();

// ── WORKOUT DEFINITIONS ────────────────────────────────────────────────

function buildAdvanced() {
  const s=[];
  s.push({name:'AUFWÄRMEN',type:'warm',duration:180,block:'VORBEREITUNG',blockDetail:'Lockeres Treten, Muskeln aktivieren',intensity:50,totalRounds:0,currentRound:0});
  for(let i=1;i<=8;i++){
    s.push({name:'SPRINT',type:'sprint',duration:20,block:'BLOCK 1 – TABATA',blockDetail:'8 Runden · 20 Sek. Sprint / 10 Sek. Erholung\nMaximales Tempo, voller Widerstand',intensity:100,totalRounds:8,currentRound:i});
    s.push({name:'ERHOLUNG',type:'rest',duration:10,block:'BLOCK 1 – TABATA',blockDetail:'8 Runden · 20 Sek. Sprint / 10 Sek. Erholung\n'+(i<8?'Kurz ausrollen, Atem holen':'Letzte Runde! Kurz ausrollen'),intensity:40,totalRounds:8,currentRound:i});
  }
  s.push({name:'AKTIVE PAUSE',type:'pause',duration:120,block:'ÜBERGANG',blockDetail:'Mittleres Tempo, tief atmen\nBereitmachen für Block 2',intensity:60,totalRounds:0,currentRound:0});
  for(let i=1;i<=5;i++){
    s.push({name:'INTERVALL',type:'sprint',duration:40,block:'BLOCK 2 – INTERVALL',blockDetail:'5 Runden · 40 Sek. Intervall / 20 Sek. Erholung\nHohes Tempo, mittlerer Widerstand',intensity:90,totalRounds:5,currentRound:i});
    s.push({name:'ERHOLUNG',type:'rest',duration:20,block:'BLOCK 2 – INTERVALL',blockDetail:'5 Runden · 40 Sek. Intervall / 20 Sek. Erholung\n'+(i<5?'Ausfahren, Atmung kontrollieren':'Letzte Runde! Dann Ausfahren'),intensity:50,totalRounds:5,currentRound:i});
  }
  s.push({name:'AUSFAHREN',type:'cool',duration:180,block:'COOLDOWN',blockDetail:'Sehr lockeres Treten, Puls senken\nDu hast es geschafft! 🎉',intensity:40,totalRounds:0,currentRound:0});
  return s;
}

function buildMedium() {
  const s=[];
  s.push({name:'AUFWÄRMEN',type:'warm',duration:180,block:'VORBEREITUNG',blockDetail:'Lockeres Treten, gleichmässig einfahren',intensity:50,totalRounds:0,currentRound:0});
  for(let i=1;i<=6;i++){
    s.push({name:'SPRINT',type:'sprint',duration:30,block:'BLOCK 1 – SPRINT',blockDetail:'6 Runden · 30 Sek. Sprint / 30 Sek. Erholung\nHohes Tempo, guter Widerstand',intensity:85,totalRounds:6,currentRound:i});
    s.push({name:'ERHOLUNG',type:'rest',duration:30,block:'BLOCK 1 – SPRINT',blockDetail:'6 Runden · 30 Sek. Sprint / 30 Sek. Erholung\n'+(i<6?'Locker ausrollen, Atem holen':'Letzte Runde! Locker ausrollen'),intensity:40,totalRounds:6,currentRound:i});
  }
  s.push({name:'AKTIVE PAUSE',type:'pause',duration:120,block:'ÜBERGANG',blockDetail:'Ruhiges Treten, Atem normalisieren\nBereitmachen für Block 2',intensity:55,totalRounds:0,currentRound:0});
  for(let i=1;i<=4;i++){
    s.push({name:'INTERVALL',type:'sprint',duration:40,block:'BLOCK 2 – INTERVALL',blockDetail:'4 Runden · 40 Sek. Intervall / 20 Sek. Erholung\nMittleres-hohes Tempo, mittlerer Widerstand',intensity:80,totalRounds:4,currentRound:i});
    s.push({name:'ERHOLUNG',type:'rest',duration:20,block:'BLOCK 2 – INTERVALL',blockDetail:'4 Runden · 40 Sek. Intervall / 20 Sek. Erholung\n'+(i<4?'Kurz ausfahren':'Letzte Runde! Dann Ausfahren'),intensity:45,totalRounds:4,currentRound:i});
  }
  s.push({name:'AUSFAHREN',type:'cool',duration:180,block:'COOLDOWN',blockDetail:'Sehr lockeres Treten, Puls senken\nGut gemacht! 🎉',intensity:40,totalRounds:0,currentRound:0});
  return s;
}

const WORKOUTS = { advanced: buildAdvanced(), medium: buildMedium() };
const CIRC=2*Math.PI*140;
const CLR={sprint:'#ff3c3c',rest:'#3caaff',warm:'#3cffa0',pause:'#aa88ff',cool:'#3cffa0'};

let WORKOUT=[], TOTAL=0;
let step=0,left=0,elapsed=0,tmr=null,running=false;

function pad(n){return String(n).padStart(2,'0');}
function fmt(s){return `${Math.floor(s/60)}:${pad(s%60)}`;}

function dots(total,cur){
  const g=document.getElementById('rounds-grid');
  g.innerHTML='';
  if(!total){g.innerHTML='<span style="font-size:1.2rem;color:var(--dim)">—</span>';return;}
  for(let i=1;i<=total;i++){
    const d=document.createElement('div');
    d.className='round-dot'+(i<cur?' done':i===cur?' active':'');
    d.textContent=i;
    g.appendChild(d);
  }
}

function ui(){
  const x=WORKOUT[step],c=CLR[x.type];
  document.getElementById('phase-name').textContent=x.name;
  document.getElementById('phase-name').style.color=c;
  document.getElementById('ring-fill').style.stroke=c;
  document.getElementById('ring-fill').style.strokeDashoffset=CIRC*(1-left/x.duration);
  document.getElementById('countdown').textContent=fmt(left);
  document.getElementById('countdown').style.color=(left<=5&&x.type==='sprint')?'#ff3c3c':'var(--text)';
  document.getElementById('intensity-pct').textContent=x.intensity+'%';
  document.getElementById('intensity-fill').style.width=x.intensity+'%';
  document.getElementById('intensity-fill').style.background=c;
  document.getElementById('block-name').textContent=x.block;
  document.getElementById('block-detail').textContent=x.blockDetail;
  dots(x.totalRounds,x.currentRound);
  const nx=WORKOUT[step+1];
  if(nx){
    document.getElementById('next-phase').textContent=nx.name;
    document.getElementById('next-phase').style.color=CLR[nx.type];
    document.getElementById('next-duration').textContent=nx.duration+' Sekunden';
  } else {
    document.getElementById('next-phase').textContent='FERTIG!';
    document.getElementById('next-duration').textContent='';
  }
  const pct=Math.round(elapsed/TOTAL*100);
  document.getElementById('total-fill').style.width=pct+'%';
  document.getElementById('total-pct').textContent=pct+'%';
  document.getElementById('total-time').textContent=fmt(elapsed)+' / 20:00';
}

function tick(){
  if(left>0){left--;elapsed++;ui();}
  else{
    step++;
    if(step>=WORKOUT.length){clearInterval(tmr);running=false;document.getElementById('finish-screen').style.display='flex';return;}
    left=WORKOUT[step].duration;ui();
  }
}

function startWorkout(level){
  const ss=document.getElementById('start-screen');
  ss.style.opacity='0';setTimeout(()=>ss.style.display='none',500);
  WORKOUT=WORKOUTS[level];
  TOTAL=WORKOUT.reduce((a,x)=>a+x.duration,0);
  step=0;elapsed=0;left=WORKOUT[0].duration;ui();
  if(tmr)clearInterval(tmr);tmr=setInterval(tick,1000);running=true;
}

function showStartScreen(){
  if(tmr)clearInterval(tmr);running=false;
  document.getElementById('finish-screen').style.display='none';
  const ss=document.getElementById('start-screen');
  ss.style.display='flex';ss.style.opacity='1';
}

window.onload=()=>{
  WORKOUT=WORKOUTS.advanced;
  TOTAL=WORKOUT.reduce((a,x)=>a+x.duration,0);
  left=WORKOUT[0].duration;ui();
};

document.addEventListener('keydown',e=>{
  if(e.code==='Space'){
    if(running){clearInterval(tmr);running=false;}
    else if(WORKOUT.length){tmr=setInterval(tick,1000);running=true;}
  }
});
</script>
</body>
</html>
